services:
  # PostgreSQL database for credentials and audit logs
  fmc_mcp_postgres:
    image: postgres:15-alpine
    container_name: fmc_mcp_postgres
    environment:
      POSTGRES_DB: fmc_mcp
      POSTGRES_USER: mcp_user
      POSTGRES_PASSWORD: changeme
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/config/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "${POSTGRES_PORT:-15434}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mcp_user -d fmc_mcp"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fmc-mcp-network
    restart: unless-stopped

  # Certificate initialization service (generates self-signed certs on first startup)
  fmc_mcp_cert_init:
    image: alpine:latest
    container_name: fmc_mcp_cert_init
    command: sh /scripts/generate-certs.sh
    volumes:
      - certs:/app/certs
      - ./scripts:/scripts:ro
    environment:
      - CERT_DIR=/app/certs
      - CERT_DAYS=${CERT_DAYS:-365}
      - CERT_SERVER_IP=${CERT_SERVER_IP:-}
      - CERT_CN=${CERT_CN:-fmc-mcp}
      - CERT_ORG=${CERT_ORG:-FMC MCP}
    networks:
      - fmc-mcp-network

  # Cisco FMC MCP Server
  fmc_mcp_mcp_server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fmc_mcp_mcp_server
    depends_on:
      fmc_mcp_postgres:
        condition: service_healthy
    networks:
      - fmc-mcp-network
    environment:
      # Database (use service name on Docker network)
      DATABASE_URL: postgresql://mcp_user:changeme@fmc_mcp_postgres:5432/fmc_mcp

      # FMC Connection
      FMC_HOST_URL: ${FMC_HOST_URL:-https://192.168.1.1}
      FMC_USERNAME: ${FMC_USERNAME:-admin}
      FMC_PASSWORD: ${FMC_PASSWORD}
      FMC_VERIFY_SSL: ${FMC_VERIFY_SSL:-false}

      # Security
      EDIT_MODE_ENABLED: ${EDIT_MODE_ENABLED:-false}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-lGczu6Yzd2IrRrcJF3cOS8BsAOO6R-1761BRDusbCuM=}
      SESSION_SECRET_KEY: ${SESSION_SECRET_KEY:-change-me-in-production}

      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./openapi_specs:/app/openapi_specs:ro
      - ./logs:/app/logs
    stdin_open: true
    tty: true
    restart: unless-stopped
    command: >
      sh -c "
        echo 'Waiting for database to be ready...' &&
        sleep 5 &&
        echo 'Initializing database...' &&
        python scripts/init_database.py &&
        echo 'Starting FMC MCP server...' &&
        python src/main.py
      "

  # FastAPI Web API Backend (HTTPS)
  fmc_mcp_web_api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fmc_mcp_web_api
    depends_on:
      fmc_mcp_postgres:
        condition: service_healthy
      fmc_mcp_cert_init:
        condition: service_completed_successfully
    networks:
      - fmc-mcp-network
    ports:
      - "${WEB_API_PORT:-8446}:${WEB_API_PORT:-8446}"
      - "${INTERNAL_HTTP_PORT:-7102}:${INTERNAL_HTTP_PORT:-7102}"
    environment:
      # Database (use service name on Docker network)
      DATABASE_URL: postgresql://mcp_user:changeme@fmc_mcp_postgres:5432/fmc_mcp

      # Security
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-lGczu6Yzd2IrRrcJF3cOS8BsAOO6R-1761BRDusbCuM=}

      # MCP Remote Access (optional - leave empty for open access)
      MCP_API_TOKEN: ${MCP_API_TOKEN:-}

      # SSL/TLS Configuration
      SSL_ENABLED: "true"
      SSL_CERTFILE: /app/certs/server.crt
      SSL_KEYFILE: /app/certs/server.key
      WEB_API_PORT: ${WEB_API_PORT:-8446}
      INTERNAL_HTTP_PORT: ${INTERNAL_HTTP_PORT:-7102}

      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./openapi_specs:/app/openapi_specs:ro
      - ./logs:/app/logs
      - ./scripts:/app/scripts:ro
      - certs:/app/certs:ro
    restart: unless-stopped
    command: ["sh", "/app/scripts/start-web-api.sh"]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsk https://localhost:${WEB_API_PORT:-8446}/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Next.js Web UI (HTTPS)
  fmc_mcp_web_ui:
    build:
      context: ./web-ui
      dockerfile: Dockerfile
    container_name: fmc_mcp_web_ui
    depends_on:
      - fmc_mcp_web_api
      - fmc_mcp_cert_init
    networks:
      - fmc-mcp-network
    ports:
      - "${WEB_UI_PORT:-7445}:${WEB_UI_PORT:-7445}"
    environment:
      # Backend API URL for server-side proxying over Docker network
      - BACKEND_API_URL=http://fmc_mcp_web_api:${INTERNAL_HTTP_PORT:-7102}
      # SSL/TLS Configuration
      - SSL_ENABLED=true
      - SSL_CERTFILE=/app/certs/server.crt
      - SSL_KEYFILE=/app/certs/server.key
      # External HTTPS port
      - PORT=${WEB_UI_PORT:-7445}
      # Internal Next.js port
      - INTERNAL_PORT=${WEB_UI_INTERNAL_PORT:-7102}
      # Allow self-signed certificates for internal communication
      - NODE_TLS_REJECT_UNAUTHORIZED=0
    volumes:
      - certs:/app/certs:ro
    command:
      - sh
      - -c
      - |
        test -n "$BACKEND_API_URL" || { echo "ERROR: BACKEND_API_URL is required"; exit 1; }
        node https-server.js
    restart: unless-stopped

networks:
  fmc-mcp-network:
    external: true
    name: ${DOCKER_EXTERNAL_NETWORK:-openshell-cluster-nemoclaw}

volumes:
  postgres_data:
    driver: local
  certs:
    name: fmc-mcp-certs
    driver: local
